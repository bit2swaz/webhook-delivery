# production docker compose - full webhook delivery stack
#
# usage (from repo root):
#   docker compose -f docker/docker-compose.yml up -d
#
# required environment variables:
#   JWT_SECRET        - jwt signing secret (must be set, no default in prod)
#   POSTGRES_PASSWORD - postgresql password (defaults to "postgres" for local dev)
#
# set these in a .env file at the repo root or export them before running.

services:

  # --------------------------------------------------------------------------
  # api - fastapi application server
  # --------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/webhooks"
      SYNC_DATABASE_URL: "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/webhooks"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      RUN_MIGRATIONS_ON_START: "false"
    # run alembic migrations then start the server
    command:
      - "sh"
      - "-c"
      - "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - webhooks_net

  # --------------------------------------------------------------------------
  # worker - celery delivery worker (scale with --scale worker=N or deploy.replicas in swarm)
  # --------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/webhooks"
      SYNC_DATABASE_URL: "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/webhooks"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    # deploy.replicas is respected in docker swarm; use --scale worker=2 for standalone compose
    deploy:
      replicas: 2
    networks:
      - webhooks_net

  # --------------------------------------------------------------------------
  # db - postgresql 16
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: webhooks
      # scram-sha-256 is recommended for production; supported by asyncpg and psycopg2
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - webhooks_net

  # --------------------------------------------------------------------------
  # redis - broker and result backend
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webhooks_net

  # --------------------------------------------------------------------------
  # prometheus - metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - webhooks_net

  # --------------------------------------------------------------------------
  # echo - minimal http echo server used only during smoke tests
  # start with: docker compose --profile smoke up
  # --------------------------------------------------------------------------
  echo:
    image: traefik/whoami:latest
    networks:
      - webhooks_net
    profiles:
      - smoke

volumes:
  pg_data:

networks:
  webhooks_net:
    driver: bridge
